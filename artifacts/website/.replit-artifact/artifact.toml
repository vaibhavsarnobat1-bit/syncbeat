kind = "web"
previewPath = "/"
title = "Simple Website"
version = "1.0.0"
id = "artifacts/website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19161
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/website run dev"

[services.env]
PORT = "19161"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/website", "run", "build"]
publicDir = "artifacts/website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
